<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3D Avatar CV </title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #0f172a, #020617);
    color: white;
    font-family: Arial;
    overflow: hidden;
}

.scene {
    width: 600px;
    height: 600px;
    position: relative;
}

#avatar3D {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    z-index: 1;
}

#cardsContainer {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    z-index: 2;
}

.card {
    position: absolute;
    width: 160px;
    padding: 10px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    backdrop-filter: blur(5px);
    text-align: center;
    transition: transform 0.3s, box-shadow 0.3s;
}

.card:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px cyan;
}

.card1 { top: 10%; left: 40%; }
.card2 { top: 40%; left: 80%; }
.card3 { top: 70%; left: 40%; }
.card4 { top: 40%; left: 0%; }
</style>

<script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.155.0/examples/js/loaders/OBJLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.155.0/examples/js/controls/OrbitControls.js"></script>
</head>

<body>

<div class="scene">
    <div id="avatar3D"></div>

    <div id="cardsContainer">
        <div class="card card1">
            <h3>Skills</h3>
            <p>HTML, CSS, JS</p>
        </div>

        <div class="card card2">
            <h3>Experience</h3>
            <p>Beginner Developer</p>
        </div>

        <div class="card card3">
            <h3>Education</h3>
            <p>Self-taught</p>
        </div>

        <div class="card card4">
            <h3>Contact</h3>
            <p>Email here</p>
        </div>
    </div>
</div>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({ alpha:true, antialias:true });
renderer.setSize(600, 600);
document.getElementById('avatar3D').appendChild(renderer.domElement);

camera.position.z = 5;

const light1 = new THREE.AmbientLight(0xffffff, 1);
scene.add(light1);

const light2 = new THREE.DirectionalLight(0xffffff, 1);
light2.position.set(5,10,7.5);
scene.add(light2);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableZoom = false;
controls.enablePan = false;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.5;

// 🔴 REPLACE THIS URL WITH YOUR OWN
const loader = new THREE.OBJLoader();
loader.load(
    'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/models/obj/walt/WaltHead.obj',
    function(object){
        object.scale.set(1.5,1.5,1.5);
        scene.add(object);
    },
    undefined,
    function(error){
        console.error(error);
    }
);

function animate(){
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
